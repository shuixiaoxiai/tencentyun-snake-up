<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理员登录</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell login-shell">
      <section class="panel login-panel">
        <h1>管理员登录</h1>
        <form id="loginForm" class="login-form">
          <input id="username" type="text" autocomplete="username" placeholder="用户名" />
          <input id="password" type="password" autocomplete="current-password" placeholder="密码" />
          <button type="submit">登录</button>
        </form>
        <div id="loginMessage" class="message">请输入管理员账号。</div>
      </section>
    </main>
    <script src="/static/admin_login.js"></script>
  </body>
</html>
